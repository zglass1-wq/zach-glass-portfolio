<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Zach Glass — Brand & Creative Executive</title>
  <meta name="description" content="Brand and creative marketing executive. 18 years building the creative infrastructure behind iconic consumer brands — Playboy, Paris Hilton, razr, and more." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://zachglass.com/" />
  <meta property="og:title" content="Zach Glass — Brand & Creative Executive" />
  <meta property="og:description" content="18 years building the creative infrastructure behind iconic consumer brands. SVP Marketing, Brand & Creative at Paris Hilton's 11:11 Media." />

  <!-- Canonical -->
  <link rel="canonical" href="https://zachglass.com/" />

  <link rel="icon" type="image/svg+xml" href="logo.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark: #0d0d0d;
      --cream: #f0ede7;
      --accent: #7d9e7e;
      --mid: #3a3a3a;
      --dim: #5a5a5a;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ── */
    .landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px 120px;
      text-align: center;
      position: relative;
    }

    /* ── Logo ── */
    .logo {
      margin-bottom: 56px;
    }

    .logo img {
      height: 52px;
      width: auto;
    }

    /* ── Eyebrow ── */
    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }

    /* ── Headline ── */
    .headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--cream);
      max-width: 760px;
      margin-bottom: 28px;
    }

    .headline em {
      font-style: italic;
      color: var(--cream);
    }

    /* ── Sub ── */
    .sub {
      font-size: clamp(15px, 2vw, 17px);
      font-weight: 300;
      color: var(--dim);
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 48px;
      letter-spacing: 0.01em;
    }

    /* ── CTAs ── */
    .actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .btn--primary {
      background: var(--accent);
      color: #0d0d0d;
      border: 1px solid var(--accent);
    }

    .btn--primary:hover {
      background: transparent;
      color: var(--accent);
    }

    .btn--ghost {
      background: transparent;
      color: var(--cream);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn--ghost:hover {
      border-color: rgba(255,255,255,0.4);
    }

    /* ── Footer strip ── */
    .footer-strip {
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 28px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .footer-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .footer-value {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--dim);
    }

    .footer-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--mid);
      flex-shrink: 0;
    }

    /* ── Subtle grain overlay ── */
    .landing::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .landing > * { position: relative; z-index: 1; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .landing { padding: 60px 24px 100px; }
      .footer-strip { flex-direction: column; gap: 4px; text-align: center; }
    }
  </style>
</head>
<body>

  <main class="landing">

    <div class="logo">
      <img src="logo.svg" alt="Zach Glass" />
    </div>

    <p class="eyebrow">Brand &amp; Creative Executive &nbsp;·&nbsp; Los Angeles</p>

    <h1 class="headline">
      Most brand executives<br>think in campaigns.<br>
      <em>Zach Glass</em> thinks<br>in systems.
    </h1>

    <p class="sub">
      18 years building the creative infrastructure behind iconic consumer brands.
    </p>

    <div class="actions">
      <a href="portfolio.html" class="btn btn--primary">View Work &nbsp;→</a>
      <a href="https://linkedin.com/in/zglass" target="_blank" rel="noopener" class="btn btn--ghost">LinkedIn &nbsp;↗</a>
    </div>

  </main>

  <footer class="footer-strip">
    <span class="footer-label">Currently</span>
    <div class="footer-dot"></div>
    <span class="footer-value">SVP Marketing, Brand &amp; Creative &nbsp;·&nbsp; Paris Hilton's 11:11 Media</span>
  </footer>

</body>
</html>
